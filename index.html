    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Constants & Themes ---
        const HEIGHT_OPTIONS = ["4'0\"", "4'1\"", "4'2\"", "4'3\"", "4'4\"", "4'5\"", "4'6\"", "4'7\"", "4'8\"", "4'9\"", "4'10\"", "4'11\"", "5'0\"", "5'1\"", "5'2\"", "5'3\"", "5'4\"", "5'5\"", "5'6\"", "5'7\"", "5'8\"", "5'9\"", "5'10\"", "5'11\"", "6'0\"", "6'1\"", "6'2\"", "6'3\"", "6'4\"", "6'5\"", "6'6\"", "6'7\"", "6'8\"", "6'9\"", "6'10\"", "6'11\"", "7'0\""];
        
        const THEMES = {
            classic: { primary: '#064e3b', secondary: '#B08968', icon: '#FDFCF8', name: 'Classic Emerald', uiPrimary: '#064e3b', uiBg: '#fcf9f2', isDark: false },
            modern: { primary: '#022c22', secondary: '#2dd4bf', icon: '#ffffff', name: 'Emerald Night', uiPrimary: '#14b8a6', uiBg: '#011511', isDark: true },
            gold: { primary: '#634832', secondary: '#d4af37', icon: '#d4af37', name: 'Gold Royale', uiPrimary: '#634832', uiBg: '#fdfcf8', isDark: false }
        };

        const SAMPLE_DATA = {
            fullName: 'Ibrahim Khalil',
            gender: 'Male',
            dob: '1995-05-15',
            height: "5'10\"",
            maritalStatus: 'Unmarried',
            nationality: 'Bangladeshi',
            presentAddress: 'Dhanmondi, Dhaka',
            contactNumber: '01700-000000',
            email: 'ibrahim.khalil@email.com',
            facebookLink: 'facebook.com/ibrahim_khalil',
            religion: 'Islam',
            orientation: 'Sunni',
            salahStatus: '5 times regularly',
            quranAbility: 'Can read fluently',
            highestQualification: "Bachelor's",
            occupation: 'Software Engineer',
            fatherName: 'Late Abdur Rahman',
            motherName: 'Maryam Begum',
            familyBackground: 'Respectable family focusing on deen and education.',
            personality: 'Calm and family-oriented.',
            prefReligiousQualities: 'Should be regular in Salah and modest.',
            selfDescription: 'I try my best to live according to the Sunnah.'
        };

        // --- Core Components ---

        // Enhanced Icon component for PDF reliability
        const Icon = ({ name, className = "", theme = 'classic' }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const iconName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    const iconElement = iconRef.current;
                    // Clear previous icon content if any
                    iconElement.innerHTML = ''; 
                    iconElement.setAttribute('data-lucide', iconName);
                    window.lucide.createIcons({
                        attrs: { 
                            class: `${className} lucide-rendered`,
                            'stroke-width': '2.5',
                            'stroke': 'currentColor',
                            'fill': className.includes('fill-current') ? 'currentColor' : 'none'
                        },
                        nameAttr: 'data-lucide',
                        icons: window.lucide.icons 
                    });
                }
            }, [name, className, theme]);
            return <span className="inline-flex items-center justify-center pointer-events-none min-w-[1em] min-h-[1em]"><i ref={iconRef}></i></span>;
        };

        const PrivacyModal = ({ onAccept }) => (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[5000] flex items-center justify-center px-4 backdrop-blur-md bg-[#064e3b]/20">
                <motion.div initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }} className="max-w-lg w-full bg-white rounded-[2.5rem] p-8 sm:p-12 shadow-2xl border-[8px] border-[#fcf9f2] relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 opacity-[0.03] islamic-pattern rotate-45"></div>
                    <div className="relative z-10 text-center">
                        <div className="w-20 h-20 bg-emerald-50 rounded-3xl flex items-center justify-center mx-auto mb-8 text-[#064e3b]">
                            <Icon name="shield-check" className="w-10 h-10" />
                        </div>
                        <h2 className="text-3xl font-serif font-black text-[#064e3b] mb-4">Your Privacy is Sacred</h2>
                        <h3 className="text-lg font-serif font-bold text-[#B08968] mb-6 font-bengali">আপনার গোপনীয়তা আমাদের অগ্রাধিকার</h3>
                        
                        <div className="space-y-4 mb-10 text-slate-500 font-medium leading-relaxed">
                            <p>This is a <strong>privacy-first studio</strong>. Your data is processed entirely in your browser through local encryption. We never store or see your information.</p>
                            <p className="font-bengali text-sm bg-emerald-50/50 p-4 rounded-2xl italic">"আপনার তথ্য ১০০% ইন-ব্রাউজার এনক্রিপশন দ্বারা সুরক্ষিত। আমরা কোনো তথ্য আমাদের সার্ভারে সেভ করি না।"</p>
                        </div>
                        
                        <button onClick={onAccept} className="w-full py-5 bg-[#064e3b] text-white font-black rounded-2xl hover:bg-emerald-900 transition-all shadow-xl shadow-emerald-900/20 uppercase tracking-widest text-sm">
                            I Understand & Proceed
                        </button>
                    </div>
                </motion.div>
            </motion.div>
        );

        const PhotoUpload = ({ value, onChange }) => {
            const fileInputRef = useRef(null);
            const [isOptimizing, setIsOptimizing] = useState(false);

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsOptimizing(true);
                const reader = new FileReader();
                reader.onload = (readerEvent) => {
                    const image = new Image();
                    image.onload = () => {
                        // Canvas Resizing & Compression Engine
                        const canvas = document.createElement('canvas');
                        let width = image.width;
                        let height = image.height;
                        const max_px = 800; // Optimal size for CV Photo

                        if (width > height) {
                            if (width > max_px) {
                                height *= max_px / width;
                                width = max_px;
                            }
                        } else {
                            if (height > max_px) {
                                width *= max_px / height;
                                height = max_px;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(image, 0, 0, width, height);
                        
                        // Output as JPEG with 0.7 quality to save massive space
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        onChange(compressedDataUrl);
                        setIsOptimizing(false);
                    };
                    image.src = readerEvent.target.result;
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="space-y-4">
                    <label className="block text-sm font-bold text-slate-700 tracking-tight">Profile Photo / <span className="font-bengali">ছবি</span> <span className="block text-[10px] text-emerald-500 font-black uppercase tracking-widest mt-0.5">Auto-Optimized Studio Engine</span></label>
                    <div className="flex items-center gap-6">
                        <div className="w-24 h-24 rounded-[2rem] bg-[#064e3b]/5 border-2 border-dashed border-[#064e3b]/10 flex items-center justify-center overflow-hidden shadow-inner relative">
                            {value ? <img src={value} className="w-full h-full object-cover" /> : <Icon name="camera" className="w-8 h-8 text-[#064e3b]/20" />}
                            {isOptimizing && (
                                <div className="absolute inset-0 bg-[#064e3b]/40 backdrop-blur-sm flex items-center justify-center">
                                    <Icon name="loader-2" className="w-6 h-6 text-white animate-spin" />
                                </div>
                            )}
                        </div>
                        <div className="flex flex-col gap-2">
                            <button onClick={() => fileInputRef.current.click()} disabled={isOptimizing} className="text-xs font-bold text-white bg-[#064e3b] px-5 py-2.5 rounded-xl hover:bg-emerald-800 transition-all shadow-lg shadow-emerald-900/10 disabled:opacity-50">
                                {isOptimizing ? 'Optimizing...' : 'Update Photo'}
                            </button>
                            {value && !isOptimizing && <button onClick={() => onChange(null)} className="text-[10px] font-bold text-rose-500 hover:text-rose-600 transition-colors uppercase tracking-widest pl-1">Remove</button>}
                        </div>
                    </div>
                    <input type="file" ref={fileInputRef} onChange={handleFileChange} className="hidden" accept="image/*" />
                </div>
            );
        };

        const CVDataRow = ({ label, value, theme = 'classic' }) => {
            if (!value) return null;
            const themeColors = THEMES[theme] || THEMES.classic;
            const isDark = themeColors.isDark;
            return (
                <div className="flex py-1.5 border-b border-[#064e3b]/5 last:border-0 items-baseline gap-2" style={{ borderColor: isDark ? 'rgba(255,255,255,0.05)' : `${themeColors.primary}11` }}>
                    <span className="w-[38%] text-[9px] font-bold uppercase tracking-[0.2em]" style={{ color: isDark ? '#2dd4bf' : themeColors.secondary }}>{label}</span>
                    <span className={`w-[62%] text-[11px] font-semibold leading-tight whitespace-pre-wrap break-words ${isDark ? 'text-slate-100' : 'text-slate-700'}`}>{value}</span>
                </div>
            );
        };

        const CVSection = ({ title, icon, children, theme = 'classic' }) => {
            const themeColors = THEMES[theme] || THEMES.classic;
            const isDark = themeColors.isDark;
            return (
                <div className="mb-6 break-inside-avoid">
                    <div className="flex items-center gap-3 mb-4 group">
                        <div className="w-8 h-8 rounded-lg flex items-center justify-center shadow-md transition-transform" style={{ backgroundColor: isDark ? '#2dd4bf' : themeColors.primary, color: isDark ? '#011511' : (themeColors.icon || themeColors.secondary) }}>
                            <Icon name={icon} className="w-4 h-4 relative top-[0.5px]" />
                        </div>
                        <div className="flex-1 border-b-[2px] border-double pb-1.5" style={{ borderColor: isDark ? 'rgba(255,255,255,0.1)' : `${themeColors.primary}22` }}>
                            <h4 className="text-sm font-serif font-black uppercase tracking-[0.15em] relative top-[1px]" style={{ color: isDark ? 'white' : themeColors.primary }}>{title}</h4>
                        </div>
                    </div>
                    <div className="pl-1 space-y-0.5">{children}</div>
                </div>
            );
        };

        const CVDocument = ({ data, theme = 'classic', id = "cv-document", pageSize = 'a4' }) => {
            const themeColors = THEMES[theme] || THEMES.classic;
            const isDark = themeColors.isDark;
            const heightClass = pageSize === 'legal' ? 'min-h-[356mm]' : 'min-h-[297mm]';
            const borderSize = pageSize === 'legal' ? 'border-[14px]' : 'border-[12px]';
            
            const qrFields = [
                `Verified Muslim Marriage CV`,
                `Name: ${data.fullName || 'User'}`,
                `Gender: ${data.gender || 'N/A'}`,
                `Religion: ${data.religion || 'Islam'}`,
                `Qualification: ${data.highestQualification || 'N/A'}`,
                `Occupation: ${data.occupation || 'N/A'}`,
                data.contactNumber ? `Contact: ${data.contactNumber}` : ''
            ].filter(Boolean).join('\n');
            const qrData = encodeURIComponent(qrFields);
            
            return (
                <div id={id} className={`w-[210mm] ${heightClass} paper-shadow relative overflow-hidden islamic-pattern font-sans ${borderSize} transition-all duration-500 ${isDark ? 'bg-[#022c22] text-white' : 'bg-[#fcfaf4] text-slate-800'}`} style={{ borderColor: themeColors.primary }}>
                    <div className="absolute inset-1.5 border-[2px] border-double pointer-events-none" style={{ borderColor: isDark ? 'rgba(255,255,255,0.05)' : `${themeColors.secondary}44` }}></div>
                    
                    {/* QR Code - Top Right Overlay (Enlarged) */}
                    <div className="absolute top-10 right-10 z-20 print:top-12 print:right-12">
                        <div className={`p-2 rounded-2xl shadow-md border ${isDark ? 'bg-slate-900/50 border-white/5' : 'bg-white border-slate-100/50'}`}>
                            <div className="relative">
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${qrData}`} className={`w-20 h-20 ${isDark ? 'invert opacity-90' : 'opacity-90'}`} />
                                <div className="absolute inset-0 border border-current opacity-10 rounded-sm"></div>
                            </div>
                            <p className={`text-[6px] font-black uppercase tracking-tighter text-center mt-1.5 ${isDark ? 'text-teal-400' : 'text-slate-400'}`}>Verified MMCV Studio</p>
                        </div>
                    </div>

                    <div className="p-[10mm] sm:p-[12mm] relative z-10 flex flex-col h-full">
                        {/* Elegant Header with Bismillah */}
                        <div className="mb-12 relative text-left">
                            <p className="font-arabic text-2xl mb-8 opacity-80 select-none text-center" style={{ color: themeColors.secondary }}>بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
                            
                            {/* Flex Row: Photo Left, Name Right */}
                            <div className="flex items-center gap-10">
                                {data.profilePhoto && (
                                    <div className={`w-40 h-40 rounded-[3rem] border-[6px] shadow-2xl overflow-hidden transform transition-transform duration-500 flex items-center justify-center flex-shrink-0 ${isDark ? 'border-[#115e59] bg-slate-900' : 'border-white bg-white'}`} style={{ ringColor: `${themeColors.primary}11` }}>
                                        <img src={data.profilePhoto} className="w-full h-full object-contain" />
                                    </div>
                                )}
                                <div className="flex-1">
                                    <h1 className="text-5xl font-serif font-black mb-4 tracking-tighter drop-shadow-sm uppercase leading-[0.9]" style={{ color: isDark ? 'white' : themeColors.primary }}>
                                        {data.fullName || "Marriage Biodata"}
                                    </h1>
                                    <div className="flex items-center gap-3">
                                        <div className="h-[2px] w-12" style={{ backgroundColor: themeColors.secondary }}></div>
                                        <p className="text-[11px] font-black uppercase tracking-[0.4em] opacity-80" style={{ color: themeColors.secondary }}>
                                            Premium Profile | <span className="font-bengali">জীবনবৃত্তান্ত</span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="space-y-1 flex-1">
                            <CVSection title="Basic Attributes" icon="user" theme={theme}>
                                <div className="grid grid-cols-2 gap-x-10">
                                    <CVDataRow label="Gender" value={data.gender} theme={theme} />
                                    <CVDataRow label="Birth Date" value={data.dob} theme={theme} />
                                    <CVDataRow label="Height" value={data.height} theme={theme} />
                                    <CVDataRow label="Marital Status" value={data.maritalStatus} theme={theme} />
                                    <CVDataRow label="Nationality" value={data.nationality} theme={theme} />
                                    <CVDataRow label="Contact Num" value={data.contactNumber} theme={theme} />
                                    <CVDataRow label="Email" value={data.email} theme={theme} />
                                    <CVDataRow label="Facebook" value={data.facebookLink} theme={theme} />
                                </div>
                                <CVDataRow label="Full Address" value={data.presentAddress} theme={theme} />
                            </CVSection>

                            <CVSection title="Religious Identity" icon="shield-check" theme={theme}>
                                <div className="grid grid-cols-2 gap-x-10">
                                    <CVDataRow label="Religion" value={data.religion} theme={theme} />
                                    <CVDataRow label="Orientation" value={data.orientation} theme={theme} />
                                    <CVDataRow label="Daily Salah" value={data.salahStatus} theme={theme} />
                                    <CVDataRow label="Quranic Literacy" value={data.quranAbility} theme={theme} />
                                </div>
                            </CVSection>

                            <CVSection title="Education & Professional" icon="briefcase" theme={theme}>
                                <div className="grid grid-cols-2 gap-x-10">
                                    <CVDataRow label="Qualification" value={data.highestQualification} theme={theme} />
                                    <CVDataRow label="Current Role" value={data.occupation} theme={theme} />
                                </div>
                            </CVSection>

                            <CVSection title="Personal Vision" icon="sparkles" theme={theme}>
                                <div className={`p-4 border-[2px] border-double rounded-xl text-[10px] leading-relaxed italic whitespace-pre-wrap break-words ${isDark ? 'bg-slate-900/40 border-white/10 text-slate-300' : 'bg-white/40 border-[#B08968]/20 text-slate-600'}`}>
                                    "{data.prefReligiousQualities}"
                                </div>
                                {data.selfDescription && (
                                    <div className="mt-3 text-[10px] leading-tight font-serif font-medium opacity-90 italic text-center whitespace-pre-wrap break-words" style={{ color: isDark ? themeColors.secondary : themeColors.primary }}>
                                        -- {data.selfDescription} --
                                    </div>

                                    <PhotoUpload value={formData.profilePhoto} onChange={v => updateField('profilePhoto', v)} />
                                    <div className="grid md:grid-cols-2 gap-8">
                                        <AppInputField label="Full Name" required value={formData.fullName} onChange={v => updateField('fullName', v)} theme={theme} />
                                        <AppSelectField label="Gender" required options={['Male', 'Female']} value={formData.gender} onChange={v => updateField('gender', v)} theme={theme} />
                                        <AppInputField label="Date of Birth" type="date" required value={formData.dob} onChange={v => updateField('dob', v)} theme={theme} />
                                        <AppSelectField label="Height" options={HEIGHT_OPTIONS} value={formData.height} onChange={v => updateField('height', v)} theme={theme} />
                                    </div>
                                    <div className="grid md:grid-cols-2 gap-8">
                                        <AppInputField label="Email Address" value={formData.email} onChange={v => updateField('email', v)} placeholder="example@mail.com" theme={theme} />
                                        <AppInputField label="Facebook Link" value={formData.facebookLink} onChange={v => updateField('facebookLink', v)} placeholder="facebook.com/username" theme={theme} />
                                    </div>
                                    <AppInputField label="WhatsApp/Contact" value={formData.contactNumber} onChange={v => updateField('contactNumber', v)} theme={theme} />
                                    <div className="md:col-span-2">
                                        <AppTextareaField label="Present Address" bnLabel="বর্তমান ঠিকানা" value={formData.presentAddress} onChange={v => updateField('presentAddress', v)} theme={theme} />
                                    </div>
                                </div>
                            </CardInner>

                            <CardInner title="Religious Profile" bnTitle="ধর্মীয় তথ্য" icon="shield" theme={theme}>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <AppInputField label="Religion" value={formData.religion} onChange={v => updateField('religion', v)} theme={theme} />
                                    <div className="md:col-span-2">
                                        <AppTextareaField label="Daily Salah Status" bnLabel="সালাত আদায় করেন কি?" value={formData.salahStatus} onChange={v => updateField('salahStatus', v)} theme={theme} />
                                    </div>
                                    <div className="md:col-span-2">
                                        <AppTextareaField label="Quran Reading" bnLabel="আল-কুরআন তিলাওয়াত" value={formData.quranAbility} onChange={v => updateField('quranAbility', v)} theme={theme} />
                                    </div>
                                </div>
                            </CardInner>

                            <CardInner title="Education & Life" bnTitle="শিক্ষা ও বৃত্তি" icon="briefcase" theme={theme}>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="md:col-span-2">
                                        <AppTextareaField label="Highest Qualification" bnLabel="সর্বোচ্চ যোগ্যতা" value={formData.highestQualification} onChange={v => updateField('highestQualification', v)} theme={theme} />
                                    </div>
                                    <div className="md:col-span-2">
                                        <AppTextareaField label="Current Occupation" bnLabel="পেশা" value={formData.occupation} onChange={v => updateField('occupation', v)} theme={theme} />
                                    </div>
                                </div>
                            </CardInner>

                            <CardInner title="Vision" bnTitle="ব্যক্তিগত ও পছন্দ" icon="sparkles" theme={theme}>
                                <div className="space-y-8">
                                    <AppTextareaField label="Partner Vision" value={formData.prefReligiousQualities} onChange={v => updateField('prefReligiousQualities', v)} theme={theme} />
                                    <AppTextareaField label="Self Description" value={formData.selfDescription} onChange={v => updateField('selfDescription', v)} theme={theme} />
                                </div>
                            </CardInner>

                            <CardInner title="Extra Attributes" bnTitle="অতিরিক্ত তথ্য ও কাস্টম ফিল্ড" icon="plus" theme={theme}>
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between mb-8">
                                        <div>
                                            <h4 className="text-xs font-black uppercase tracking-widest" style={{ color: themeColors.primary }}>Custom Attributes</h4>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Add your own fields</p>
                                        </div>
                                        <button onClick={addCustomField} className="px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all flex items-center gap-2 hover:scale-105 shadow-sm" style={{ backgroundColor: `${themeColors.primary}11`, color: themeColors.primary }}>
                                            <Icon name="plus" className="w-3 h-3" /> Add Field
                                        </button>
                                    </div>

                                    <div className="space-y-6">
                                        <AnimatePresence>
                                            {(formData.customFields || []).map((field, idx) => (
                                                <motion.div key={field.id} initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, scale: 0.95 }} className={`p-6 rounded-3xl border border-dashed transition-all ${themeColors.isDark ? 'bg-white/5 border-white/10' : 'bg-slate-50 border-slate-200'}`}>
                                                    <div className="flex gap-4 items-end">
                                                        <div className="flex-1">
                                                            <AppInputField label={`Label / নাম`} value={field.label} onChange={(val) => updateCustomField(field.id, 'label', val)} placeholder="e.g. Hobbies" theme={theme} />
                                                        </div>
                                                        <div className="flex-[2]">
                                                            <AppInputField label="Content / তথ্য" value={field.value} onChange={(val) => updateCustomField(field.id, 'value', val)} placeholder="Detailed information" theme={theme} />
                                                        </div>
                                                        <button onClick={() => removeCustomField(field.id)} className="p-3.5 rounded-xl hover:bg-rose-50 text-rose-300 hover:text-rose-500 transition-all mb-0.5">
                                                            <Icon name="trash-2" className="w-5 h-5" />
                                                        </button>
                                                    </div>
                                                </motion.div>
                                            ))}
                                        </AnimatePresence>
                                        
                                        {(formData.customFields || []).length === 0 && (
                                            <div className="py-12 text-center border-2 border-dashed rounded-[2.5rem] opacity-30" style={{ borderColor: themeColors.isDark ? 'rgba(255,255,255,0.1)' : `${themeColors.primary}22` }}>
                                                <Icon name="plus-square" className="w-8 h-8 mx-auto mb-4 opacity-20" />
                                                <p className="text-[10px] font-black uppercase tracking-[0.3em]">No custom fields added yet</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </CardInner>
                        </div>

                        <div id="preview-section" className="w-full lg:w-[45%] mt-12 lg:mt-0">
                            <div className="lg:sticky lg:top-[140px] flex flex-col items-center">
                                <div className="w-full mb-4 flex items-center justify-between px-2">
                                    <span className="text-[10px] font-black text-[#064e3b] uppercase tracking-widest">Live Studio Preview</span>
                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{pageSize === 'a4' ? 'A4 Single Page Layout' : 'Legal Size Portrait'}</span>
                                </div>
                                <div 
                                    className="flex flex-col items-center overflow-hidden transition-all duration-500" 
                                    style={{ height: `${(pageSize === 'legal' ? 1346 : 1123) * cvScale}px`, width: `${794 * cvScale}px` }}
                                >
                                    <div className="origin-top shadow-2xl ring-1 ring-black/5" style={{ transform: `scale(${cvScale})`, width: '794px' }}>
                                        <CVDocument data={formData} theme={theme} id="cv-webview-target" pageSize={pageSize} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="py-20 px-8 border-t mt-12 text-center islamic-pattern no-print transition-colors duration-500" style={{ borderColor: `${themeColors.secondary}22`, backgroundColor: themeColors.isDark ? themeColors.uiBg : 'white' }}>
                        <div className="flex justify-center mb-10">
                            <LogoBespoke themeColors={themeColors} />
                        </div>
                        <div className="max-w-2xl mx-auto">
                            <h3 className="text-xl font-serif font-black uppercase tracking-wider mb-2" style={{ color: themeColors.isDark ? 'white' : themeColors.primary }}>Developed By Mahmudur Rahman Imon</h3>
                            <p className="text-xs font-bold uppercase tracking-[0.3em]" style={{ color: themeColors.secondary }}>Premium Engineering Product of Ideomet Technologies</p>
                            
                            <div className="mt-12 pt-12 border-t" style={{ borderColor: `${themeColors.secondary}11` }}>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] leading-relaxed">
                                    Privacy-First Design • Encrypted Experience • No Backend • 100% In-Browser
                                </p>
                            </div>
                        </div>
                    </footer>

                    {/* Print-Only Wrapper to ensure CV is centrally placed and 1:1 scale */}
                    <div className="hidden print:block print:m-0 print:p-0">
                        <CVDocument data={formData} theme={theme} id="cv-print-output" pageSize={pageSize} />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
